<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VFX Familiar</title>
    <script>
      // D-WEBUI-16: read theme preference BEFORE any render to avoid FOUC.
      // Falls back to 'dark' default if absent. Set data-theme on <html>
      // immediately so theme.css variables resolve to the correct values.
      (function () {
        try {
          var t = localStorage.getItem('vfx-familiar:theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (_) { /* localStorage may be blocked — keep default */ }
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-DhaW2CpS.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-oqCE3cPV.css">

  </body>
</html>
